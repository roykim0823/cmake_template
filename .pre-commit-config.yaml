# Pre-commit hooks — https://pre-commit.com
#
# Install:
#   pip install pre-commit       # or: brew install pre-commit
#   pre-commit install           # registers .git/hooks/pre-commit
#
# Run on demand:
#   pre-commit run --all-files
#
# These hooks are local-only by default. CI still runs the canonical
# clang-format check (`.github/workflows/clang-format-check.yml`) on every PR.

repos:
  # ── Generic file hygiene ─────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$  # Markdown uses trailing spaces for hard breaks
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  # ── C/C++ formatting (mirrors .clang-format) ─────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v19.1.7
    hooks:
      - id: clang-format
        types_or: [c++, c]

  # ── CMake formatting (mirrors .cmake-format.yaml) ────────────────────────
  - repo: https://github.com/cheshirekow/cmake-format-precommit
    rev: v0.6.13
    hooks:
      - id: cmake-format
      - id: cmake-lint

  # ── Markdown / JSON / YAML formatting (mirrors .prettierrc) ──────────────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [markdown, yaml, json]
        exclude: |
          (?x)^(
            \.github/.*\.yml|
            CHANGELOG\.md
          )$

  # ── Shell scripts ────────────────────────────────────────────────────────
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  # ── Conventional Commits on commit message ───────────────────────────────
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []
